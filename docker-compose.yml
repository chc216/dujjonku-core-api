services:
  mysql:
    image: mysql:8.0
    container_name: dujjonku-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}         
      MYSQL_DATABASE: core_db          
      LC_ALL: C.UTF-8
      TZ: Asia/Seoul


    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql      
  redis:
    image: redis:latest
    container_name: dashboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data     

volumes:
  mysql-data:
  redis-data:
